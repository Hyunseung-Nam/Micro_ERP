<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Micro ERP 운영 콘솔</title>
    <link rel="icon" href="data:," />
    <style>
      :root {
        --bg: #edf2f7;
        --card: #fff;
        --line: #d8dee8;
        --text: #1b2430;
        --muted: #5f6c7b;
        --primary: #2c5282;
        --primary-strong: #1f3f66;
        --danger: #b42318;
        --danger-bg: #ffe8e8;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "Apple SD Gothic Neo", "Pretendard", sans-serif;
        color: var(--text);
        background: radial-gradient(circle at 0% 0%, #f8fbff, var(--bg));
      }
      .page { max-width: 1400px; margin: 0 auto; padding: 18px; }
      .card {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 12px;
        box-shadow: 0 8px 24px rgba(20, 35, 50, 0.06);
      }
      .top {
        display: grid;
        grid-template-columns: 1fr auto auto;
        gap: 10px;
        padding: 14px;
        margin-bottom: 12px;
        align-items: center;
      }
      .title-wrap h1 { margin: 0; font-size: 24px; }
      .title-wrap p { margin: 6px 0 0; font-size: 12px; color: var(--muted); }
      .badge {
        border: 1px solid #d6e5fb;
        background: #f4f8ff;
        color: #285ea8;
        border-radius: 999px;
        padding: 8px 12px;
        font-size: 12px;
        font-weight: 700;
      }
      .toolbar {
        display: grid;
        grid-template-columns: 1fr auto auto;
        gap: 10px;
        margin-bottom: 12px;
      }
      .toolbar .card { padding: 10px; }
      .search {
        width: 100%;
        height: 38px;
        border: 1px solid var(--line);
        border-radius: 9px;
        padding: 0 12px;
      }
      button {
        border: 1px solid var(--line);
        border-radius: 9px;
        background: #fff;
        font-size: 13px;
        font-weight: 700;
        color: var(--text);
        height: 38px;
        padding: 0 14px;
        cursor: pointer;
      }
      button.primary {
        border-color: var(--primary);
        background: var(--primary);
        color: #fff;
      }
      button.primary:hover { background: var(--primary-strong); }
      button:hover { background: #f3f7fb; }
      .kpi-grid {
        display: grid;
        grid-template-columns: repeat(4, minmax(160px, 1fr));
        gap: 10px;
        margin-bottom: 12px;
      }
      .kpi { padding: 12px; }
      .kpi .label { color: var(--muted); font-size: 12px; }
      .kpi .value { margin-top: 6px; font-size: 28px; font-weight: 800; }
      .kpi .sub { margin-top: 4px; font-size: 12px; color: var(--muted); }
      .layout {
        display: grid;
        grid-template-columns: 1.5fr 1fr;
        gap: 12px;
      }
      .section { padding: 12px; }
      .section h3 { margin: 0 0 10px; font-size: 15px; }
      .table-wrap { overflow: auto; max-height: 58vh; border: 1px solid var(--line); border-radius: 10px; }
      table { width: 100%; border-collapse: collapse; min-width: 680px; }
      th, td { border-bottom: 1px solid #edf1f5; padding: 8px 10px; font-size: 12px; text-align: left; }
      th { background: #f7f9fc; color: #4f5f72; font-weight: 700; position: sticky; top: 0; }
      td.num { text-align: right; }
      tr.low { background: var(--danger-bg); }
      .danger { color: var(--danger); font-weight: 700; }
      .status { font-size: 12px; color: var(--muted); margin-top: 8px; }
      .login-modal, .dialog-overlay {
        position: fixed; inset: 0; background: rgba(16, 24, 40, 0.45);
        display: flex; align-items: center; justify-content: center; z-index: 20;
      }
      .dialog {
        width: min(620px, calc(100vw - 24px));
        max-height: calc(100vh - 40px);
        overflow: auto;
        background: #fff;
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 14px;
      }
      .dialog h3 { margin: 0 0 10px; }
      .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
      label { display: flex; flex-direction: column; gap: 6px; font-size: 12px; color: var(--muted); }
      input, textarea { border: 1px solid var(--line); border-radius: 8px; padding: 8px 10px; }
      textarea { min-height: 80px; }
      .dialog-actions { margin-top: 10px; display: flex; justify-content: flex-end; gap: 8px; }
      .hidden { display: none !important; }
      @media (max-width: 1080px) {
        .layout { grid-template-columns: 1fr; }
        .kpi-grid { grid-template-columns: repeat(2, minmax(160px, 1fr)); }
      }
      @media (max-width: 760px) {
        .top { grid-template-columns: 1fr; }
        .toolbar { grid-template-columns: 1fr; }
        .kpi-grid { grid-template-columns: 1fr; }
        .form-grid { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <div id="loginModal" class="login-modal">
      <div class="dialog">
        <h3>운영 콘솔 로그인</h3>
        <div class="form-grid">
          <label>아이디<input id="loginUsername" value="admin" /></label>
          <label>비밀번호<input id="loginPassword" type="password" value="admin123" /></label>
        </div>
        <div id="loginError" class="danger" style="margin-top:8px;"></div>
        <div class="dialog-actions"><button id="loginBtn" class="primary">로그인</button></div>
      </div>
    </div>

    <div class="page">
      <div class="card top">
        <div class="title-wrap">
          <h1>Micro ERP 운영 콘솔</h1>
          <p>모니터링, 승인, 감사 추적 중심 웹 화면</p>
        </div>
        <div id="userBadge" class="badge">사용자: -</div>
        <div id="timeBadge" class="badge">-</div>
      </div>

      <div class="toolbar">
        <div class="card"><input id="searchInput" class="search" placeholder="품목 ID/품목명/위치 검색" /></div>
        <div class="card" style="padding:10px;"><button id="refreshBtn" class="primary">새로고침</button></div>
        <div class="card" style="padding:10px;"><button id="requestAdjustBtn">승인요청 생성</button></div>
      </div>

      <div class="kpi-grid">
        <div class="card kpi"><div class="label">총 품목 수</div><div id="kpiItems" class="value">0</div><div class="sub">활성 재고 품목</div></div>
        <div class="card kpi"><div class="label">안전재고 부족</div><div id="kpiLow" class="value danger">0</div><div class="sub">즉시 확인 필요</div></div>
        <div class="card kpi"><div class="label">대기 승인 건수</div><div id="kpiPending" class="value">0</div><div class="sub">미처리 승인 요청</div></div>
        <div class="card kpi"><div class="label">최근 감사로그</div><div id="kpiAudit" class="value">0</div><div class="sub">최근 100건 기준</div></div>
      </div>

      <div class="layout">
        <div class="card section">
          <h3>재고 리스크 테이블</h3>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>품목 ID</th><th>품목명</th><th class="num">현재고</th><th class="num">안전재고</th><th class="num">권장발주</th><th>위치별 재고</th>
                </tr>
              </thead>
              <tbody id="inventoryBody"><tr><td colspan="6">데이터 로딩 중...</td></tr></tbody>
            </table>
          </div>
          <div id="inventoryStatus" class="status"></div>
        </div>

        <div style="display:grid; gap:12px;">
          <div class="card section">
            <h3>승인함 (대기)</h3>
            <div class="table-wrap" style="max-height:220px;">
              <table>
                <thead><tr><th>ID</th><th>유형</th><th>요청자</th><th>처리</th></tr></thead>
                <tbody id="approvalBody"><tr><td colspan="4">데이터 없음</td></tr></tbody>
              </table>
            </div>
          </div>

          <div class="card section">
            <h3>감사 로그 (최근 100건)</h3>
            <div class="table-wrap" style="max-height:260px;">
              <table>
                <thead><tr><th>시각</th><th>사용자</th><th>액션</th><th>대상</th></tr></thead>
                <tbody id="auditBody"><tr><td colspan="4">데이터 없음</td></tr></tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div id="dialogOverlay" class="dialog-overlay hidden">
      <div class="dialog">
        <h3>재고조정 승인요청 생성</h3>
        <div class="form-grid">
          <label>품목 ID<input id="reqItemId" /></label>
          <label>위치 ID<input id="reqLocationId" /></label>
          <label>증감 수량(+/-)<input id="reqDelta" type="number" value="0" /></label>
          <label>사유<textarea id="reqReason"></textarea></label>
        </div>
        <div class="dialog-actions">
          <button id="dialogCancel">취소</button>
          <button id="dialogConfirm" class="primary">요청 생성</button>
        </div>
      </div>
    </div>

    <script>
      const state = {
        token: "",
        me: null,
        inventory: [],
        approvals: [],
        audits: [],
      };

      const $ = (id) => document.getElementById(id);

      async function api(path, method = "GET", body = null) {
        const headers = { "Content-Type": "application/json" };
        if (state.token) headers.Authorization = `Bearer ${state.token}`;
        const response = await fetch(path, { method, headers, body: body ? JSON.stringify(body) : null });
        const raw = await response.text();
        let parsed = {};
        try { parsed = raw ? JSON.parse(raw) : {}; } catch (_) { parsed = { message: raw }; }
        if (!response.ok) throw new Error(parsed.message || `HTTP ${response.status}`);
        return parsed;
      }

      function esc(value) {
        return String(value ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#39;");
      }

      async function login() {
        $("loginError").textContent = "";
        try {
          const auth = await api("/api/auth/login", "POST", {
            username: $("loginUsername").value.trim(),
            password: $("loginPassword").value,
          });
          state.token = auth.token;
          state.me = await api("/api/auth/me");
          $("userBadge").textContent = `사용자: ${state.me.username} (${state.me.role})`;
          $("loginModal").classList.add("hidden");
          await refreshAll();
        } catch (error) {
          $("loginError").textContent = `로그인 실패: ${error.message}`;
        }
      }

      function hasScope(scope) {
        if (!state.me) return false;
        if (state.me.role === "ADMIN") return true;
        return (state.me.scopes || []).includes(scope);
      }

      function aggregateInventory(rows) {
        const map = new Map();
        for (const row of rows || []) {
          const itemId = row.itemId;
          if (!itemId) continue;
          if (!map.has(itemId)) {
            map.set(itemId, {
              itemId,
              itemName: row.itemName || "-",
              total: 0,
              safety: Number(row.safetyStock || 0),
              unit: row.unit || "-",
              locations: {},
            });
          }
          const target = map.get(itemId);
          const qty = Number(row.quantity || 0);
          target.total += qty;
          target.safety = Math.max(target.safety, Number(row.safetyStock || 0));
          target.locations[row.locationId || "UNSPECIFIED"] = qty;
        }
        return [...map.values()].sort((a, b) => a.itemId.localeCompare(b.itemId)).map((row) => {
          row.recommended = Math.max(row.safety - row.total, 0);
          row.isLow = row.total < row.safety;
          return row;
        });
      }

      function applySearchAndRender() {
        const keyword = $("searchInput").value.trim().toLowerCase();
        const filtered = state.inventory.filter((row) => {
          if (!keyword) return true;
          const locations = Object.entries(row.locations).map(([k, v]) => `${k}:${v}`).join(", ");
          return `${row.itemId} ${row.itemName} ${locations}`.toLowerCase().includes(keyword);
        });

        const body = $("inventoryBody");
        if (!filtered.length) {
          body.innerHTML = '<tr><td colspan="6">데이터 없음</td></tr>';
        } else {
          body.innerHTML = filtered.map((row) => {
            const locations = Object.entries(row.locations).sort(([a],[b]) => a.localeCompare(b)).map(([k, v]) => `${k}:${v}`).join(", ");
            return `
              <tr class="${row.isLow ? "low" : ""}">
                <td>${esc(row.itemId)}</td>
                <td>${esc(row.itemName)}</td>
                <td class="num">${row.total}</td>
                <td class="num">${row.safety}</td>
                <td class="num">${row.recommended}</td>
                <td>${esc(locations || "-")}</td>
              </tr>
            `;
          }).join("");
        }

        const lowCount = filtered.filter((x) => x.isLow).length;
        $("inventoryStatus").textContent = `표시 품목 ${filtered.length}건 / 안전재고 부족 ${lowCount}건 / ${new Date().toLocaleString()}`;
        $("kpiItems").textContent = String(state.inventory.length);
        $("kpiLow").textContent = String(state.inventory.filter((x) => x.isLow).length);
      }

      function renderApprovals() {
        const body = $("approvalBody");
        if (!state.approvals.length) {
          body.innerHTML = '<tr><td colspan="4">대기 승인 없음</td></tr>';
          $("kpiPending").textContent = "0";
          return;
        }

        body.innerHTML = state.approvals.map((row) => `
          <tr>
            <td>${row.approvalId}</td>
            <td>${esc(row.requestType)}</td>
            <td>${esc(row.requestedBy)}</td>
            <td>
              ${hasScope("approval.approve") ? `<button data-id="${row.approvalId}" data-act="approve">승인</button>` : ""}
              ${hasScope("approval.reject") ? `<button data-id="${row.approvalId}" data-act="reject">반려</button>` : ""}
            </td>
          </tr>
        `).join("");

        $("kpiPending").textContent = String(state.approvals.length);

        body.querySelectorAll("button[data-act]").forEach((btn) => {
          btn.addEventListener("click", async () => {
            const id = Number(btn.dataset.id);
            const act = btn.dataset.act;
            try {
              if (act === "approve") {
                await api(`/api/approvals/${id}/approve`, "POST", {});
              } else {
                const reason = prompt("반려 사유", "") || "";
                await api(`/api/approvals/${id}/reject`, "POST", { reason });
              }
              await refreshAll();
            } catch (error) {
              alert(error.message);
            }
          });
        });
      }

      function renderAudits() {
        const body = $("auditBody");
        if (!state.audits.length) {
          body.innerHTML = '<tr><td colspan="4">로그 없음</td></tr>';
          $("kpiAudit").textContent = "0";
          return;
        }
        body.innerHTML = state.audits.slice(0, 100).map((row) => `
          <tr>
            <td>${esc(row.createdAt || "")}</td>
            <td>${esc(row.username)}</td>
            <td>${esc(row.action)}</td>
            <td>${esc((row.targetType || "") + ':' + (row.targetId || ""))}</td>
          </tr>
        `).join("");
        $("kpiAudit").textContent = String(state.audits.length);
      }

      async function refreshAll() {
        $("timeBadge").textContent = "로딩 중...";
        const tasks = [api("/api/inventory")];
        if (hasScope("approval.read")) tasks.push(api("/api/approvals?status=PENDING"));
        if (hasScope("audit.read")) tasks.push(api("/api/audit/logs"));

        try {
          const results = await Promise.all(tasks);
          state.inventory = aggregateInventory(results[0]);
          state.approvals = hasScope("approval.read") ? (results[1] || []) : [];
          state.audits = hasScope("audit.read") ? (results[hasScope("approval.read") ? 2 : 1] || []) : [];

          applySearchAndRender();
          renderApprovals();
          renderAudits();
          $("timeBadge").textContent = new Date().toLocaleString();
        } catch (error) {
          $("timeBadge").textContent = "업데이트 실패";
          alert(`데이터 갱신 실패: ${error.message}`);
        }
      }

      function openRequestDialog() {
        if (!hasScope("approval.request")) {
          alert("승인요청 생성 권한이 없습니다.");
          return;
        }
        $("dialogOverlay").classList.remove("hidden");
      }

      function closeRequestDialog() {
        $("dialogOverlay").classList.add("hidden");
      }

      async function submitRequestAdjust() {
        const payload = {
          itemId: $("reqItemId").value.trim(),
          locationId: $("reqLocationId").value.trim(),
          deltaQuantity: Number($("reqDelta").value || 0),
          reason: $("reqReason").value.trim(),
        };

        try {
          await api("/api/approvals", "POST", {
            requestType: "INVENTORY_ADJUST",
            requestPayload: JSON.stringify(payload),
          });
          closeRequestDialog();
          await refreshAll();
          alert("승인요청이 등록되었습니다.");
        } catch (error) {
          alert(`승인요청 실패: ${error.message}`);
        }
      }

      function bindEvents() {
        $("loginBtn").addEventListener("click", login);
        $("refreshBtn").addEventListener("click", refreshAll);
        $("searchInput").addEventListener("input", applySearchAndRender);
        $("requestAdjustBtn").addEventListener("click", openRequestDialog);
        $("dialogCancel").addEventListener("click", closeRequestDialog);
        $("dialogConfirm").addEventListener("click", submitRequestAdjust);
        $("dialogOverlay").addEventListener("click", (event) => {
          if (event.target === $("dialogOverlay")) closeRequestDialog();
        });
      }

      bindEvents();
    </script>
  </body>
</html>
